spring.application.name=gigshield-backend

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/gigshield_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Lakshmi@15
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
app.jwt.secret=gigshield-super-secret-key-2024-minimum-256-bits-long-for-hs256
app.jwt.expiration=86400000

# Weather API (OpenWeatherMap - free tier)
weather.api.key=YOUR_OPENWEATHERMAP_API_KEY
weather.api.url=https://api.openweathermap.org/data/2.5/weather

# AQI API (WAQI - free tier)
aqi.api.key=YOUR_WAQI_API_KEY
aqi.api.url=https://api.waqi.info/feed

# Risk Thresholds
risk.rain.threshold=10.0
risk.temp.threshold=40.0
risk.aqi.threshold=150.0

# Scheduler
scheduler.enabled=true

# CORS
cors.allowed.origins=http://localhost:5173

server.port=8081
